<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Карен — Java Spring Developer | Главная</title>
     <style>
          :root {
               --bg: #0a0a0f;
               --card: #12121a;
               --gold: #f0c040;
               --green: #7ee787;
               --blue: #58a6ff;
               --red: #da3633;
               --border: #1e1e2e;
               --text: #c9d1d9;
               --sub: #8b949e;
               --radius: 20px;
               --glow: 0 0 40px rgba(240, 192, 64, 0.12);
          }

          * {
               margin: 0;
               padding: 0;
               box-sizing: border-box;
          }

          body {
               font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
               background: var(--bg);
               color: var(--text);
               min-height: 100vh;
               display: flex;
               align-items: center;
               justify-content: center;
               padding: 20px;
               background-image:
                    radial-gradient(ellipse at 20% 20%, rgba(240, 192, 64, 0.04) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 80%, rgba(88, 166, 255, 0.04) 0%, transparent 50%);
          }

          .container {
               background: var(--card);
               border: 1px solid var(--border);
               border-radius: var(--radius);
               padding: 50px 40px;
               max-width: 650px;
               width: 100%;
               text-align: center;
               box-shadow: var(--glow);
          }

          .avatar {
               width: 100px;
               height: 100px;
               background: linear-gradient(135deg, var(--gold), #d4a017);
               border-radius: 50%;
               margin: 0 auto 25px;
               display: flex;
               align-items: center;
               justify-content: center;
               font-size: 3em;
          }

          h1 {
               color: var(--gold);
               font-size: 2.4em;
               margin-bottom: 8px;
          }

          .tagline {
               color: var(--sub);
               font-size: 1em;
               margin-bottom: 30px;
          }

          .badge {
               display: inline-block;
               background: rgba(240, 192, 64, 0.1);
               color: var(--gold);
               padding: 6px 16px;
               border-radius: 20px;
               font-size: 0.85em;
               font-weight: 600;
               margin: 4px;
          }

          .badge-green {
               background: rgba(126, 231, 135, 0.1);
               color: var(--green);
          }

          .badge-blue {
               background: rgba(88, 166, 255, 0.1);
               color: var(--blue);
          }

          .nav {
               margin-top: 35px;
          }

          .nav a {
               display: inline-block;
               padding: 12px 24px;
               margin: 6px;
               border-radius: 10px;
               text-decoration: none;
               font-weight: 600;
               transition: all 0.25s;
               border: 1px solid var(--border);
               color: var(--text);
          }

          .nav a:hover {
               border-color: var(--gold);
               color: var(--gold);
          }

          @media (max-width: 550px) {
               .container {
                    padding: 35px 20px;
               }

               h1 {
                    font-size: 1.8em;
               }

               .nav a {
                    display: block;
                    margin: 8px 0;
               }
          }
     </style>
</head>

<body>
     <div class="container">
          <div class="avatar">🐅</div>
          <h1>Карен</h1>
          <p class="tagline">Java Spring Developer • 14 лет • Создаю бэкенды</p>
          <span class="badge">Java 21</span>
          <span class="badge">Spring Boot 4</span>
          <span class="badge-green">Gradle</span>
          <span class="badge-blue">H2 / PostgreSQL</span>
          <span class="badge">REST API</span>
          <span class="badge-green">Linux Debian</span>
          <div class="nav">
               <a href="/aboutMe">Обо мне</a>
               <a href="/projects">Проекты</a>
               <a href="/contacts">Контакты</a>
          </div>
     </div>
</body>

</html>
